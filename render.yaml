services:
  - type: web
    name: stock-agent-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stock-agent-db
          property: connectionString
      - key: AUTH_DATABASE_URL
        fromDatabase:
          name: stock-agent-db
          property: connectionString
      - key: PAPER_TRADING_DATABASE_URL
        fromDatabase:
          name: stock-agent-db
          property: connectionString

databases:
  - name: stock-agent-db
    plan: free
