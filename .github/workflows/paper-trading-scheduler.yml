name: Paper Trading Scheduler

on:
  schedule:
    # Both UTC variants are scheduled; ET guard below ensures only the correct one executes.
    - cron: "35 13 * * 1-5" # 09:35 ET during DST
    - cron: "35 14 * * 1-5" # 09:35 ET during standard time
    - cron: "5 20 * * 1-5"  # 16:05 ET during DST
    - cron: "5 21 * * 1-5"  # 16:05 ET during standard time
  workflow_dispatch:
    inputs:
      action:
        description: "Which action to run"
        required: true
        default: "both"
        type: choice
        options:
          - buy
          - close
          - both

permissions:
  contents: read

concurrency:
  group: paper-trading-scheduler
  cancel-in-progress: false

jobs:
  run-paper-trading-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_URL: ${{ secrets.STOCK_AGENT_APP_URL }}
      CRON_TOKEN: ${{ secrets.PAPER_TRADING_CRON_TOKEN }}

    steps:
      - name: Validate required secret
        shell: bash
        run: |
          if [ -z "${APP_URL}" ]; then
            echo "Missing required secret: STOCK_AGENT_APP_URL"
            exit 1
          fi

      - name: Decide action for this run
        id: decide
        shell: bash
        run: |
          ACTION=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ACTION="${{ github.event.inputs.action }}"
          else
            case "${{ github.event.schedule }}" in
              "35 13 * * 1-5"|"35 14 * * 1-5") ACTION="buy" ;;
              "5 20 * * 1-5"|"5 21 * * 1-5") ACTION="close" ;;
              *) ACTION="" ;;
            esac
          fi

          echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
          echo "Resolved action: ${ACTION}"

      - name: Execute auto-buy
        if: steps.decide.outputs.action == 'buy' || steps.decide.outputs.action == 'both'
        shell: bash
        run: |
          ET_NOW="$(TZ=America/New_York date +%H:%M)"
          APP_BASE="${APP_URL%/}"

          # For scheduled runs, only run exactly at ET 09:35.
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${ET_NOW}" != "09:35" ]; then
            echo "Skipping buy at ET ${ET_NOW}; waiting for ET 09:35 run."
            exit 0
          fi

          URL="${APP_BASE}/paper-trading/auto-buy"
          echo "Calling ${URL}"

          if [ -n "${CRON_TOKEN}" ]; then
            HTTP_CODE=$(curl -sS -L -X POST "${URL}" \
              -H "X-Cron-Token: ${CRON_TOKEN}" \
              --retry 4 --retry-delay 8 --retry-connrefused --connect-timeout 20 --max-time 120 \
              -o /tmp/auto_buy_response.txt -w "%{http_code}")
          else
            HTTP_CODE=$(curl -sS -L -X POST "${URL}" \
              --retry 4 --retry-delay 8 --retry-connrefused --connect-timeout 20 --max-time 120 \
              -o /tmp/auto_buy_response.txt -w "%{http_code}")
          fi

          echo "HTTP ${HTTP_CODE}"
          cat /tmp/auto_buy_response.txt
          echo

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Auto-buy request failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          echo "Auto-buy request sent successfully."

      - name: Execute check-and-close
        if: steps.decide.outputs.action == 'close' || steps.decide.outputs.action == 'both'
        shell: bash
        run: |
          ET_NOW="$(TZ=America/New_York date +%H:%M)"
          APP_BASE="${APP_URL%/}"

          # For scheduled runs, only run exactly at ET 16:05.
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${ET_NOW}" != "16:05" ]; then
            echo "Skipping close at ET ${ET_NOW}; waiting for ET 16:05 run."
            exit 0
          fi

          URL="${APP_BASE}/paper-trading/check-positions"
          echo "Calling ${URL}"

          if [ -n "${CRON_TOKEN}" ]; then
            HTTP_CODE=$(curl -sS -L -X POST "${URL}" \
              -H "X-Cron-Token: ${CRON_TOKEN}" \
              --retry 4 --retry-delay 8 --retry-connrefused --connect-timeout 20 --max-time 120 \
              -o /tmp/check_close_response.txt -w "%{http_code}")
          else
            HTTP_CODE=$(curl -sS -L -X POST "${URL}" \
              --retry 4 --retry-delay 8 --retry-connrefused --connect-timeout 20 --max-time 120 \
              -o /tmp/check_close_response.txt -w "%{http_code}")
          fi

          echo "HTTP ${HTTP_CODE}"
          cat /tmp/check_close_response.txt
          echo

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Check-and-close request failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          echo "Check-and-close request sent successfully."
