<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - KB Content Management</title>
    <style>
        :root {
            --bg: #f4f8fb;
            --panel: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --accent: #0e7490;
            --accent-dark: #155e75;
            --border: #d1d5db;
            --success-bg: #ecfdf5;
            --success-text: #065f46;
            --warning-bg: #fffbeb;
            --warning-text: #92400e;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top right, #d1fae5 0%, var(--bg) 50%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        .top-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            color: var(--text);
            padding: 9px 14px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #f8fafc;
            border-color: var(--accent);
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--accent), #0f766e);
            color: #fff;
            border: none;
        }

        .btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(14, 116, 144, 0.25);
        }

        .divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        .header {
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .status {
            background: var(--success-bg);
            color: var(--success-text);
            border: 1px solid #a7f3d0;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
            display: none;
            font-size: 0.9rem;
        }

        .status.show { display: block; }
        .status.error { background: var(--error-bg); color: var(--error-text); border-color: #fecaca; }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .filter-group select {
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            color: var(--text);
            padding: 8px 12px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .table-wrapper {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(2, 6, 23, 0.08);
        }

        .table-wrapper.empty {
            padding: 32px 16px;
            text-align: center;
            color: var(--muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            border-bottom: 2px solid var(--border);
            padding: 12px;
            text-align: left;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:last-child td { border-bottom: none; }

        .chapter-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chapter-name {
            font-weight: 600;
            color: var(--text);
        }

        .chapter-path {
            font-size: 0.85rem;
            color: var(--muted);
            font-family: monospace;
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
        }

        .metric-label {
            color: var(--muted);
            font-weight: 500;
        }

        .metric-value {
            background: #f0f9ff;
            color: #0369a1;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .action-btn {
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            color: var(--text);
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #f8fafc;
            border-color: var(--accent);
        }

        .action-btn.approve {
            background: var(--success-bg);
            color: var(--success-text);
            border-color: #a7f3d0;
        }

        .action-btn.approve:hover {
            background: #dcf8ef;
        }

        .action-btn.reject {
            background: var(--error-bg);
            color: var(--error-text);
            border-color: #fecaca;
        }

        .action-btn.reject:hover {
            background: #fce6e6;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #f0f9ff;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }

        .badge.draft {
            background: var(--warning-bg);
            color: var(--warning-text);
            border-color: #fde68a;
        }

        .badge.approved {
            background: var(--success-bg);
            color: var(--success-text);
            border-color: #a7f3d0;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .logout-btn {
            background: #fff;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 14px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: #f8fafc;
        }

        @media (max-width: 768px) {
            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 10px 8px;
            }

            .actions {
                gap: 4px;
                flex-direction: column;
            }

            .action-btn {
                padding: 5px 10px;
                font-size: 0.8rem;
                width: 100%;
            }

            .top-nav {
                gap: 6px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 0.85rem;
            }

            .filters {
                gap: 8px;
            }

            .filter-group {
                flex-direction: column;
                width: 100%;
            }

            .filter-group select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="header-actions">
            <div class="header">
                <h1>KB Content Management</h1>
                <p>Review and approve or reject knowledge base chapter contributions</p>
            </div>
            <button id="logoutBtn" class="logout-btn">Log Out</button>
        </div>

        <div class="top-nav">
            <a href="/" class="btn">← Back to Dashboard</a>
            <a href="/admin" class="btn">Admin Home</a>
            <div class="divider"></div>
            <a href="/admin/accounts" class="btn">Account Management</a>
            <a href="/admin/api-docs" class="btn">API Documentation</a>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Status:</label>
                <select id="statusFilter" onchange="loadChapters()">
                    <option value="Draft">Draft (Pending Review)</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
        </div>

        <div id="statusMsg" class="status"></div>

        <div id="tableContainer" class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Chapter</th>
                        <th>Section / Topic</th>
                        <th>Metrics</th>
                        <th style="width: 180px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="chaptersTable">
                    <tr><td colspan="4" style="text-align: center; color: var(--muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_BASE = '';
        let authToken = localStorage.getItem('token');

        async function requireAdmin() {
            if (!authToken) {
                window.location.href = '/login?next=/admin/kb-content';
                return false;
            }
            try {
                const res = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${authToken}` },
                });
                if (!res.ok) {
                    window.location.href = '/login?next=/admin/kb-content';
                    return false;
                }
                const user = await res.json();
                if (!user.is_admin) {
                    alert('You do not have admin access.');
                    window.location.href = '/';
                    return false;
                }
                return true;
            } catch (err) {
                console.error('Auth check failed:', err);
                window.location.href = '/login?next=/admin/kb-content';
                return false;
            }
        }

        async function loadChapters() {
            if (!(await requireAdmin())) return;

            const status = document.getElementById('statusFilter').value;

            try {
                const res = await fetch(`${API_BASE}/admin/kb-chapters?status=${encodeURIComponent(status)}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` },
                });
                if (!res.ok) throw new Error('Failed to load chapters');

                const data = await res.json();
                const tbody = document.getElementById('chaptersTable');
                
                if (data.chapters.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="padding: 32px; text-align: center; color: var(--muted);">
                        No ${status.toLowerCase()} chapters found
                    </td></tr>`;
                    return;
                }

                tbody.innerHTML = data.chapters.map(ch => {
                    const isApproved = status === 'Approved';
                    const isRejected = status === 'Rejected';
                    const isDraft = status === 'Draft';

                    return `
                        <tr>
                            <td>
                                <div class="chapter-info">
                                    <div class="chapter-name">${escapeHtml(ch.name)}</div>
                                    <div class="chapter-path">${escapeHtml(ch.relative_path)}</div>
                                </div>
                            </td>
                            <td>
                                <div style="font-size: 0.9rem; line-height: 1.5;">
                                    <div><strong>${escapeHtml(ch.section)}</strong></div>
                                    <div style="color: var(--muted);">${escapeHtml(ch.topic)}</div>
                                </div>
                            </td>
                            <td>
                                <div class="metric">
                                    <span class="metric-label">Relevance:</span>
                                    <span class="metric-value">${ch.weighted_relevance_score}</span>
                                </div>
                                <div class="metric">
                                    <span class="metric-label">Quality:</span>
                                    <span class="metric-value">${ch.source_quality_score}</span>
                                </div>
                                <div class="metric" style="margin-top: 4px;">
                                    <span class="metric-label">Confidence:</span>
                                    <span style="font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; background: ${ch.confidence_band === 'High' ? '#ecfdf5' : ch.confidence_band === 'Medium' ? '#fffbeb' : '#f3f4f6'}; color: ${ch.confidence_band === 'High' ? '#065f46' : ch.confidence_band === 'Medium' ? '#92400e' : '#374151'};">${ch.confidence_band}</span>
                                </div>
                            </td>
                            <td>
                                <div class="actions">
                                    ${isDraft ? `
                                        <button class="action-btn approve" onclick="approveChapter('${escapeHtml(ch.relative_path)}')">Approve</button>
                                        <button class="action-btn reject" onclick="rejectChapter('${escapeHtml(ch.relative_path)}')">Reject</button>
                                    ` : `
                                        <button class="action-btn" onclick="moveToReview('${escapeHtml(ch.relative_path)}')">Back to Draft</button>
                                    `}
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                console.error('Error loading chapters:', err);
                showStatus('Failed to load chapters', 'error');
            }
        }

        async function approveChapter(path) {
            if (!confirm('Approve this chapter for publication?')) return;

            try {
                const res = await fetch(`${API_BASE}/knowledge-base/chapter-status`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        path: path,
                        status: 'Approved',
                        note: 'Approved by admin',
                    }),
                });
                if (!res.ok) throw new Error('Failed to approve chapter');

                showStatus(`✓ Chapter approved`, 'success');
                await loadChapters();
            } catch (err) {
                console.error('Error approving chapter:', err);
                showStatus('Failed to approve chapter', 'error');
            }
        }

        async function rejectChapter(path) {
            if (!confirm('Reject this chapter? It will be marked for revision.')) return;

            try {
                const res = await fetch(`${API_BASE}/knowledge-base/chapter-status`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        path: path,
                        status: 'Rejected',
                        note: 'Rejected by admin - please revise',
                    }),
                });
                if (!res.ok) throw new Error('Failed to reject chapter');

                showStatus(`✓ Chapter rejected`, 'success');
                await loadChapters();
            } catch (err) {
                console.error('Error rejecting chapter:', err);
                showStatus('Failed to reject chapter', 'error');
            }
        }

        async function moveToReview(path) {
            if (!confirm('Move this chapter back to Draft for revision?')) return;

            try {
                const res = await fetch(`${API_BASE}/knowledge-base/chapter-status`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        path: path,
                        status: 'Draft',
                        note: 'Moved back to Draft',
                    }),
                });
                if (!res.ok) throw new Error('Failed to move chapter');

                showStatus(`✓ Chapter moved to Draft`, 'success');
                await loadChapters();
            } catch (err) {
                console.error('Error moving chapter:', err);
                showStatus('Failed to move chapter', 'error');
            }
        }

        function showStatus(msg, type = 'success') {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.className = `status show ${type === 'error' ? 'error' : ''}`;
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;',
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login';
        });

        loadChapters();
    </script>
</body>
</html>
