<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base Viewer</title>
    <style>
        :root {
            --bg: #f4f6fb;
            --panel: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --line: #cbd5e1;
            --accent: #0369a1;
            --accent-strong: #0c4a6e;
            --ok: #14532d;
            --chip: #e0f2fe;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 50%);
            color: var(--text);
            min-height: 100vh;
        }

        .shell {
            max-width: 1300px;
            margin: 0 auto;
            padding: 18px 12px 24px;
        }

        .topbar {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .topbar h1 {
            margin: 0;
            font-size: 1.35rem;
        }

        .topbar p {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .topbar-actions {
            display: flex;
            gap: 8px;
        }

        .button {
            border: 0;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
            min-height: 44px;
        }

        .button:hover { background: var(--accent-strong); }

        .layout {
            margin-top: 14px;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 12px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
            min-height: 74vh;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .filter-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            margin-bottom: 12px;
        }

        .filter-row input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            min-height: 44px;
            font-size: 0.92rem;
        }

        .filter-row button {
            min-height: 44px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            color: #0f172a;
            padding: 0 12px;
            cursor: pointer;
            font-weight: 700;
        }

        .chip {
            background: var(--chip);
            color: #0c4a6e;
            border: 1px solid #bae6fd;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .tree {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 8px;
        }

        .section {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
        }

        .section h2 {
            margin: 0 0 8px;
            font-size: 1rem;
        }

        .topic {
            border-top: 1px dashed #dbe3f0;
            padding-top: 8px;
            margin-top: 8px;
        }

        .topic:first-child {
            border-top: 0;
            margin-top: 0;
            padding-top: 0;
        }

        .topic-header {
            margin: 0 0 6px;
            color: #0f172a;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .topic-actions {
            margin-bottom: 8px;
        }

        .topic-index-link {
            border: 1px solid #dbe3f0;
            background: #fff;
            color: #334155;
            border-radius: 8px;
            padding: 6px 10px;
            min-height: 36px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .topic-index-link:hover {
            border-color: #7dd3fc;
            background: #f0f9ff;
        }

        .chapter-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 6px;
        }

        .chapter-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 6px;
        }

        .chapter-link {
            width: 100%;
            text-align: left;
            border: 1px solid #dbe3f0;
            background: #f8fafc;
            color: #0f172a;
            border-radius: 8px;
            padding: 8px 9px;
            font-size: 0.86rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .chapter-link:hover {
            border-color: #7dd3fc;
            background: #f0f9ff;
        }

        .chapter-link.active {
            border-color: #0284c7;
            background: #e0f2fe;
        }

        .chapter-status-badge {
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 0.72rem;
            font-weight: 700;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .chapter-status-badge.draft {
            color: #9a3412;
            background: #ffedd5;
            border-color: #fdba74;
        }

        .chapter-status-badge.approved {
            color: #14532d;
            background: #dcfce7;
            border-color: #86efac;
        }

        .chapter-status-badge.rejected {
            color: #7f1d1d;
            background: #fee2e2;
            border-color: #fca5a5;
        }

        .chapter-open-explorer {
            border: 1px solid #dbe3f0;
            background: #fff;
            color: #334155;
            border-radius: 8px;
            padding: 0 10px;
            min-height: 38px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .chapter-open-explorer:hover {
            border-color: #7dd3fc;
            background: #f0f9ff;
        }

        .empty {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .doc-meta {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .doc-body {
            margin: 0;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #dbe3f0;
            background: #f8fafc;
            color: #1e293b;
            line-height: 1.55;
            min-height: 56vh;
            overflow-wrap: anywhere;
        }

        .doc-body h1,
        .doc-body h2,
        .doc-body h3,
        .doc-body h4 {
            margin-top: 1.2em;
            margin-bottom: 0.5em;
            line-height: 1.3;
        }

        .doc-body h1:first-child,
        .doc-body h2:first-child,
        .doc-body h3:first-child {
            margin-top: 0;
        }

        .doc-body code {
            background: #e2e8f0;
            border-radius: 6px;
            padding: 2px 6px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.9em;
        }

        .doc-body pre {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
        }

        .doc-body pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        .doc-body blockquote {
            margin: 0;
            border-left: 4px solid #7dd3fc;
            padding-left: 12px;
            color: #334155;
        }

        .doc-actions {
            margin-bottom: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .doc-action-button {
            border: 1px solid var(--line);
            background: #fff;
            color: #0f172a;
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            font-weight: 700;
            min-height: 40px;
        }

        .status {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--ok);
        }

        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .card {
                min-height: auto;
            }

            .doc-body {
                min-height: 40vh;
            }

            .chapter-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 520px) {
            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .topbar-actions {
                width: 100%;
            }

            .button {
                width: 100%;
            }

            .filter-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div>
                <h1>Knowledge Base Viewer</h1>
                <p>Browse sections, topics, and chapters generated by your ingestion workflow.</p>
            </div>
            <div class="topbar-actions">
                <button class="button" id="refreshBtn" type="button">Refresh Tree</button>
                <button class="button" id="openBuilderBtn" type="button">Open Builder</button>
            </div>
        </header>

        <main class="layout">
            <section class="card" aria-label="Knowledge-base navigation">
                <div class="stats" id="stats"></div>
                <div class="filter-row">
                    <input id="treeFilter" type="text" placeholder="Search sections, topics, or chapters..." aria-label="Search knowledge-base tree">
                    <button id="clearFilterBtn" type="button">Clear</button>
                </div>
                <ul class="tree" id="tree"></ul>
            </section>

            <section class="card" aria-label="Chapter preview">
                <h2 id="docTitle">Select a chapter</h2>
                <div class="doc-meta" id="docMeta">Choose a chapter from the left panel to view its content.</div>
                <div class="doc-actions">
                    <button class="doc-action-button" id="openSelectedExplorerBtn" type="button" disabled>Open in Explorer</button>
                    <button class="doc-action-button" id="approveChapterBtn" type="button" disabled>Approve Chapter</button>
                    <button class="doc-action-button" id="rejectChapterBtn" type="button" disabled>Reject Chapter</button>
                </div>
                <article id="docBody" class="doc-body">No chapter selected yet.</article>
                <div class="status" id="status"></div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script>
        const treeEl = document.getElementById("tree");
        const statsEl = document.getElementById("stats");
        const docTitleEl = document.getElementById("docTitle");
        const docMetaEl = document.getElementById("docMeta");
        const docBodyEl = document.getElementById("docBody");
        const statusEl = document.getElementById("status");
        const refreshBtn = document.getElementById("refreshBtn");
        const openBuilderBtn = document.getElementById("openBuilderBtn");
        const treeFilterInput = document.getElementById("treeFilter");
        const clearFilterBtn = document.getElementById("clearFilterBtn");
        const openSelectedExplorerBtn = document.getElementById("openSelectedExplorerBtn");
        const approveChapterBtn = document.getElementById("approveChapterBtn");
        const rejectChapterBtn = document.getElementById("rejectChapterBtn");

        let activeChapterPath = "";
        let fullSections = [];

        openBuilderBtn.addEventListener("click", () => {
            window.location.href = "/knowledge-base-builder";
        });

        refreshBtn.addEventListener("click", () => {
            void loadTree();
        });

        clearFilterBtn.addEventListener("click", () => {
            treeFilterInput.value = "";
            renderTree(fullSections, "");
        });

        treeFilterInput.addEventListener("input", () => {
            renderTree(fullSections, treeFilterInput.value.trim().toLowerCase());
        });

        openSelectedExplorerBtn.addEventListener("click", async () => {
            if (!activeChapterPath) {
                statusEl.textContent = "Select a chapter first.";
                return;
            }
            await openChapterInExplorer(activeChapterPath);
        });

        approveChapterBtn.addEventListener("click", async () => {
            if (!activeChapterPath) {
                statusEl.textContent = "Select a chapter first.";
                return;
            }
            const note = window.prompt("Approval note (optional):", "") || "";
            await updateChapterStatus(activeChapterPath, "Approved", note);
            await loadChapter(activeChapterPath, null);
            await loadTree();
        });

        rejectChapterBtn.addEventListener("click", async () => {
            if (!activeChapterPath) {
                statusEl.textContent = "Select a chapter first.";
                return;
            }
            const note = window.prompt("Why reject this chapter?", "Needs manual rewrite") || "Needs manual rewrite";
            await updateChapterStatus(activeChapterPath, "Rejected", note);
            await loadChapter(activeChapterPath, null);
            await loadTree();
        });

        async function loadTree() {
            statusEl.textContent = "Loading knowledge-base tree...";
            treeEl.innerHTML = "";
            statsEl.innerHTML = "";

            try {
                const response = await fetch("/knowledge-base/index");
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.detail || "Could not load knowledge base");
                }

                fullSections = payload.sections || [];
                renderStats(payload);
                renderTree(fullSections, treeFilterInput.value.trim().toLowerCase());

                statusEl.textContent = "Knowledge-base tree loaded.";
            } catch (error) {
                statusEl.textContent = `Error: ${error.message}`;
                treeEl.innerHTML = '<li class="empty">Unable to load knowledge-base tree.</li>';
            }
        }

        function renderStats(payload) {
            const chips = [
                `Sections: ${(payload.sections || []).length}`,
                `Topics: ${payload.total_topics || 0}`,
                `Chapters: ${payload.total_chapters || 0}`,
                `Root: ${payload.kb_root || "knowledge-base"}`,
            ];

            statsEl.innerHTML = chips.map((text) => `<span class="chip">${text}</span>`).join("");
        }

        function renderTree(sections, filterText) {
            if (!sections.length) {
                treeEl.innerHTML = '<li class="empty">No sections found in knowledge-base.</li>';
                return;
            }

            const normalizedFilter = (filterText || "").toLowerCase();
            const hasFilter = normalizedFilter.length > 0;
            treeEl.innerHTML = "";
            let matchedSections = 0;

            for (const section of sections) {
                const sectionMatch = section.name.toLowerCase().includes(normalizedFilter);
                const sectionItem = document.createElement("li");
                sectionItem.className = "section";

                const sectionTitle = document.createElement("h2");
                sectionTitle.textContent = `${section.name} (${section.topic_count} topics)`;
                sectionItem.appendChild(sectionTitle);

                let sectionVisible = false;

                if (!section.topics || !section.topics.length) {
                    if (!hasFilter || sectionMatch) {
                        const emptyTopic = document.createElement("p");
                        emptyTopic.className = "empty";
                        emptyTopic.textContent = "No topics in this section yet.";
                        sectionItem.appendChild(emptyTopic);
                        sectionVisible = true;
                    }
                } else {
                    for (const topic of section.topics) {
                        const topicMatch = topic.name.toLowerCase().includes(normalizedFilter);
                        const topicBlock = document.createElement("div");
                        topicBlock.className = "topic";

                        const topicHeader = document.createElement("p");
                        topicHeader.className = "topic-header";
                        topicHeader.textContent = `${topic.name} (${topic.chapter_count} chapters)`;

                        const topicActions = document.createElement("div");
                        topicActions.className = "topic-actions";
                        if (topic.topic_index) {
                            const topicIndexButton = document.createElement("button");
                            topicIndexButton.type = "button";
                            topicIndexButton.className = "topic-index-link";
                            topicIndexButton.textContent = "Open Topic Overview";
                            topicIndexButton.addEventListener("click", async () => {
                                await loadChapter(topic.topic_index, null, `Topic: ${topic.name}`);
                            });
                            topicActions.appendChild(topicIndexButton);
                        }

                        const chapterList = document.createElement("ul");
                        chapterList.className = "chapter-list";
                        let chapterMatches = 0;

                        if (!topic.chapters || !topic.chapters.length) {
                            if (!hasFilter || sectionMatch || topicMatch) {
                                const emptyChapter = document.createElement("li");
                                emptyChapter.className = "empty";
                                emptyChapter.textContent = "No chapters yet.";
                                chapterList.appendChild(emptyChapter);
                            }
                        } else {
                            for (const chapter of topic.chapters) {
                                const chapterMatch = chapter.name.toLowerCase().includes(normalizedFilter)
                                    || chapter.relative_path.toLowerCase().includes(normalizedFilter);
                                if (hasFilter && !sectionMatch && !topicMatch && !chapterMatch) {
                                    continue;
                                }

                                chapterMatches += 1;
                                const chapterItem = document.createElement("li");
                                const chapterRow = document.createElement("div");
                                chapterRow.className = "chapter-row";

                                const button = document.createElement("button");
                                button.type = "button";
                                button.className = "chapter-link";
                                const chapterName = document.createElement("span");
                                chapterName.textContent = chapter.name;

                                const chapterStatus = (chapter.status || "Draft").toLowerCase();
                                const chapterStatusBadge = document.createElement("span");
                                chapterStatusBadge.className = `chapter-status-badge ${chapterStatus}`;
                                chapterStatusBadge.textContent = chapter.status || "Draft";

                                button.appendChild(chapterName);
                                button.appendChild(chapterStatusBadge);
                                button.dataset.path = chapter.relative_path;
                                button.addEventListener("click", async () => {
                                    await loadChapter(chapter.relative_path, button);
                                });

                                const openExplorerBtn = document.createElement("button");
                                openExplorerBtn.type = "button";
                                openExplorerBtn.className = "chapter-open-explorer";
                                openExplorerBtn.textContent = "Open in Explorer";
                                openExplorerBtn.addEventListener("click", async () => {
                                    await openChapterInExplorer(chapter.relative_path);
                                });

                                chapterRow.appendChild(button);
                                chapterRow.appendChild(openExplorerBtn);
                                chapterItem.appendChild(chapterRow);
                                chapterList.appendChild(chapterItem);
                            }
                        }

                        const showTopic = !hasFilter || sectionMatch || topicMatch || chapterMatches > 0;
                        if (showTopic) {
                            topicBlock.appendChild(topicHeader);
                            if (topicActions.childElementCount > 0) {
                                topicBlock.appendChild(topicActions);
                            }
                            topicBlock.appendChild(chapterList);
                            sectionItem.appendChild(topicBlock);
                            sectionVisible = true;
                        }
                    }
                }

                if (sectionVisible) {
                    matchedSections += 1;
                    treeEl.appendChild(sectionItem);
                }
            }

            if (matchedSections === 0) {
                treeEl.innerHTML = '<li class="empty">No results found for current search.</li>';
            }
        }

        function setActiveButton(button) {
            const allButtons = document.querySelectorAll(".chapter-link");
            allButtons.forEach((el) => el.classList.remove("active"));
            if (button) {
                button.classList.add("active");
            }
        }

        async function loadChapter(relativePath, button, titleOverride) {
            statusEl.textContent = "Loading chapter...";

            try {
                const query = encodeURIComponent(relativePath);
                const response = await fetch(`/knowledge-base/chapter?path=${query}`);
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.detail || "Could not load chapter");
                }

                activeChapterPath = payload.path;
                docTitleEl.textContent = titleOverride || payload.title;
                docMetaEl.textContent = `Path: ${payload.path} | Updated: ${new Date(payload.updated_at).toLocaleString()}`;
                renderMarkdown(payload.content);
                setActiveButton(button);
                openSelectedExplorerBtn.disabled = false;
                approveChapterBtn.disabled = false;
                rejectChapterBtn.disabled = false;
                statusEl.textContent = "Chapter loaded.";
            } catch (error) {
                statusEl.textContent = `Error: ${error.message}`;
            }
        }

        function renderMarkdown(content) {
            if (typeof marked === "undefined" || typeof DOMPurify === "undefined") {
                docBodyEl.textContent = content;
                return;
            }

            const markdownHtml = marked.parse(content || "", {
                gfm: true,
                breaks: true,
            });
            docBodyEl.innerHTML = DOMPurify.sanitize(markdownHtml);
        }

        async function openChapterInExplorer(relativePath) {
            statusEl.textContent = "Opening chapter location in explorer...";

            try {
                const response = await fetch("/knowledge-base/open-explorer", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ path: relativePath }),
                });
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.detail || "Could not open explorer");
                }
                statusEl.textContent = `${payload.message}: ${payload.path}`;
            } catch (error) {
                statusEl.textContent = `Error: ${error.message}`;
            }
        }

        async function updateChapterStatus(relativePath, chapterStatus, note) {
            statusEl.textContent = `Updating chapter status to ${chapterStatus}...`;

            try {
                const response = await fetch("/knowledge-base/chapter-status", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        path: relativePath,
                        status: chapterStatus,
                        note,
                    }),
                });

                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.detail || "Could not update chapter status");
                }

                statusEl.textContent = `${payload.message}: ${payload.path} -> ${payload.chapter_status}`;
            } catch (error) {
                statusEl.textContent = `Error: ${error.message}`;
            }
        }

        void loadTree();
    </script>
</body>
</html>
