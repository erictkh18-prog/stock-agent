<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB Builder – Sign In</title>
    <style>
        :root {
            --bg: #f6f8fa;
            --panel: #ffffff;
            --text: #111827;
            --muted: #4b5563;
            --accent: #0f766e;
            --accent-dark: #115e59;
            --border: #d1d5db;
            --ok: #065f46;
            --err: #991b1b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, #e0f2fe 0%, var(--bg) 45%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .container {
            width: 100%;
            max-width: 440px;
        }

        h1 {
            font-size: 1.6rem;
            margin: 0 0 4px;
        }

        .subtitle {
            color: var(--muted);
            margin: 0 0 24px;
            font-size: 0.95rem;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
            padding: 28px;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: 0;
            background: transparent;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--muted);
            transition: background 0.15s, color 0.15s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #fff;
        }

        .tab-btn:not(.active):hover {
            background: #f0fdf4;
            color: var(--accent);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .field { margin-bottom: 16px; }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
        }

        input:focus {
            outline: 2px solid #99f6e4;
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            border: 0;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
        }

        .btn:hover { background: var(--accent-dark); }
        .btn:disabled { opacity: 0.7; cursor: wait; }

        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .msg.ok {
            background: #d1fae5;
            color: var(--ok);
            border: 1px solid #6ee7b7;
            display: block;
        }

        .msg.err {
            background: #fee2e2;
            color: var(--err);
            border: 1px solid #fca5a5;
            display: block;
        }

        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.85rem;
            color: #1e40af;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: var(--muted);
            font-size: 0.88rem;
            text-decoration: none;
        }

        .back-link:hover { color: var(--accent); }

        @media (max-width: 480px) {
            .card { padding: 20px; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Knowledge Base Builder</h1>
        <p class="subtitle">Sign in to contribute to the trading knowledge base.</p>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Sign In</button>
                <button class="tab-btn" data-tab="register">Request Access</button>
            </div>

            <!-- Login Tab -->
            <div id="tab-login" class="tab-panel active">
                <form id="loginForm">
                    <div class="field">
                        <label for="loginEmail">Email</label>
                        <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="username" required>
                    </div>
                    <div class="field">
                        <label for="loginPassword">Password</label>
                        <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <button class="btn" id="loginBtn" type="submit">Sign In</button>
                </form>
                <div id="loginMsg" class="msg"></div>
            </div>

            <!-- Register Tab -->
            <div id="tab-register" class="tab-panel">
                <div class="info-box">
                    Account requests require admin approval before you can log in.
                    You will receive an email once your access is granted.
                </div>
                <form id="registerForm">
                    <div class="field">
                        <label for="regEmail">Email</label>
                        <input id="regEmail" type="email" placeholder="you@example.com" autocomplete="username" required>
                    </div>
                    <div class="field">
                        <label for="regPassword">Password <span style="font-weight:400;color:var(--muted)">(min 8 characters)</span></label>
                        <input id="regPassword" type="password" placeholder="••••••••" autocomplete="new-password" required minlength="8">
                    </div>
                    <div class="field">
                        <label for="regConfirm">Confirm Password</label>
                        <input id="regConfirm" type="password" placeholder="••••••••" autocomplete="new-password" required minlength="8">
                    </div>
                    <button class="btn" id="registerBtn" type="submit">Request Access</button>
                </form>
                <div id="registerMsg" class="msg"></div>
            </div>
        </div>

        <a href="/" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        // ── Tab switching ───────────────────────────────────────────────────
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const target = btn.dataset.tab;
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById("tab-" + target).classList.add("active");
            });
        });

        // ── Redirect if already authenticated ──────────────────────────────
        const existingToken = localStorage.getItem("kb_token");
        if (existingToken) {
            // Verify token is still valid
            fetch("/auth/me", {
                headers: { "Authorization": "Bearer " + existingToken }
            }).then(r => {
                if (r.ok) window.location.href = "/knowledge-base-builder";
            });
        }

        // ── Redirect target ─────────────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const redirectTo = params.get("next") || "/knowledge-base-builder";

        // ── Login form ──────────────────────────────────────────────────────
        const loginForm = document.getElementById("loginForm");
        const loginMsg  = document.getElementById("loginMsg");
        const loginBtn  = document.getElementById("loginBtn");

        loginForm.addEventListener("submit", async e => {
            e.preventDefault();
            loginMsg.className = "msg";
            loginBtn.disabled = true;
            loginBtn.textContent = "Signing in…";

            const email    = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;

            try {
                const resp = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || "Login failed");

                localStorage.setItem("kb_token", data.access_token);
                loginMsg.className = "msg ok";
                loginMsg.textContent = "Signed in! Redirecting…";
                setTimeout(() => window.location.href = redirectTo, 600);
            } catch (err) {
                loginMsg.className = "msg err";
                loginMsg.textContent = err.message;
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = "Sign In";
            }
        });

        // ── Register form ───────────────────────────────────────────────────
        const registerForm = document.getElementById("registerForm");
        const registerMsg  = document.getElementById("registerMsg");
        const registerBtn  = document.getElementById("registerBtn");

        registerForm.addEventListener("submit", async e => {
            e.preventDefault();
            registerMsg.className = "msg";
            registerBtn.disabled = true;
            registerBtn.textContent = "Submitting…";

            const email    = document.getElementById("regEmail").value.trim();
            const password = document.getElementById("regPassword").value;
            const confirm  = document.getElementById("regConfirm").value;

            if (password !== confirm) {
                registerMsg.className = "msg err";
                registerMsg.textContent = "Passwords do not match";
                registerBtn.disabled = false;
                registerBtn.textContent = "Request Access";
                return;
            }

            try {
                const resp = await fetch("/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || "Registration failed");

                registerMsg.className = "msg ok";
                registerMsg.textContent = data.message || "Request submitted.";
                registerForm.reset();

                // Auto-redirect admin immediately
                if (data.approved && data.token) {
                    localStorage.setItem("kb_token", data.token);
                    setTimeout(() => window.location.href = redirectTo, 800);
                }
            } catch (err) {
                registerMsg.className = "msg err";
                registerMsg.textContent = err.message;
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = "Request Access";
            }
        });
    </script>
</body>
</html>
